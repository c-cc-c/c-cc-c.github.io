  <!--标题-->
  <title> 个人介绍 | 关于 </title>

<style>/*css基本样式*/
  body{
    margin: 0;
  }
  .main{
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: #f9f9f9;
  }
  .main > .avatar > img{
    width: 175px;
    transition: 
    width .5s,
    border-radius .3s;
    border-radius: 50%;
  }
  .main > .name > h2{
    margin-block: .3em;
  }  
  .main > .txt {
    font-size: xx-small;
    color: #7f7f7f;
    text-align: center;
    letter-spacing: .1em;
    margin-block-end: 1em;
    animation: in .7s;
  }
  .txt::before{
    content: '“';  
    font-family: fantasy;
  }
  .txt::after{
    content: '”';
    font-family: fantasy;
  }

  @media screen and (max-width:1000px) {
    .avatar > img{
      width: 150px !important;
    }
  }
  @media screen and (max-width:260px) {
    .avatar > img{
      border-radius: 0 !important;
    }
  }
  @keyframes in {
    0%{
      transform: translateY(50%);
      filter: blur(5px);
    }
  }
</style>
<body>
<Alice them="白">
    <main class="main">
       <div class="avatar">
        <img src="https://z1.ax1x.com/2023/04/13/ppx5zAU.jpg" alt="">
       </div>
       <div class="name">
          <h2>不知名·周</h2>
       </div>
       <hr>
       <div class="txt">
          支离破碎的梦，<br>绘织平淡生活的刺.
       </div>
    </main>
</Alice>
<script>
fetch("data.json")
  .then((response) => response.json())
  .then((data) => {
    document.querySelector('.txt').innerHTML = data.text[0][Math.ceil(Math.random()*10)]
})

</script>
</body>
</html>
